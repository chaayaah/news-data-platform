services:

  postgres:
    image: postgres:16
    container_name: news-postgres

    environment:
      POSTGRES_DB: newsdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql

    ports:
      - "5432:5432"

  api:
    build: ./api
    container_name: news-api

    ports:
      - "8000:8000"

    depends_on:
      - postgres

  dashboard:
    build: ./dashboard
    container_name: news-dashboard

    ports:
      - "8501:8501"

    depends_on:
      - postgres

  pyspark:
    build: ./pyspark
    container_name: news-pyspark

    volumes:
      - ./:/app

    stdin_open: true
    tty: true

volumes:
  postgres_data: